<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>App IMC Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#4facfe,#00f2fe);
transition:0.3s;
}

.dark{
background:#121212;
}

.contenedor{
max-width:420px;
margin:20px auto;
background:white;
padding:25px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:fadeIn 0.6s ease;
}

.dark .contenedor{
background:#1e1e1e;
color:white;
}

h1{
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:14px;
margin:10px 0;
border-radius:15px;
border:none;
background:#f1f3f6;
font-size:15px;
outline:none;
transition:0.3s;
}

input:focus,select:focus{
background:#e3f2fd;
transform:scale(1.02);
}

button{
padding:12px;
border:none;
border-radius:15px;
cursor:pointer;
font-size:14px;
color:white;
transition:0.3s;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

button:hover{
transform:translateY(-2px) scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.calcular{ background:linear-gradient(45deg,#00c853,#64dd17); }
.modo{ background:#333; }
.pdf{ background:linear-gradient(45deg,#2196F3,#21CBF3); }
.borrar{ background:linear-gradient(45deg,#f44336,#ff7961); }

.botones{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

#barra{
width:100%;
height:25px;
background:#ddd;
border-radius:15px;
overflow:hidden;
margin-top:15px;
}

#progreso{
height:25px;
width:0%;
text-align:center;
line-height:25px;
font-weight:bold;
color:white;
transition:1s;
}

#resultado{
margin-top:20px;
font-size:16px;
animation:fadeIn 0.5s ease;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
font-size:13px;
}

th{
background:#4facfe;
color:white;
}

th,td{
padding:8px;
text-align:center;
border-radius:8px;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="contenedor">

<h1>📱 Calculadora IMC</h1>

<input type="text" id="nombre" placeholder="👤 Nombre del consultante">
<input type="number" id="edad" placeholder="Edad">

<select id="sexo">
<option>🚹 Masculino</option>
<option>🚺 Femenino</option>
</select>

<select id="objetivo">
<option>🔥 Bajar peso</option>
<option>⚖️ Mantener peso</option>
<option>💪 Subir peso</option>
</select>

<input type="number" id="peso" placeholder="⚖️ Peso kg">
<input type="number" id="altura" placeholder="📏 Altura Ej 1.70">

<div class="botones">
<button class="calcular" onclick="calcularIMC()">✅ Calcular</button>
<button class="modo" onclick="modoOscuro()">🌙 Modo</button>
<button class="pdf" onclick="generarPDF()">📄 PDF</button>
<button class="borrar" onclick="borrarHistorial()">🗑️ Borrar</button>
</div>

<div id="barra">
<div id="progreso"></div>
</div>

<div id="resultado"></div>

<h3>📋 Historial</h3>

<table>
<tr>
<th>Nombre</th>
<th>Fecha</th>
<th>IMC</th>
<th>Estado</th>
</tr>
<tbody id="historial"></tbody>
</table>

</div>

<script>

cargarHistorial();

function generarRecomendaciones(edad, objetivo, clasificacion){

let reco = "";

// Edad
if(edad < 18){
reco += "🧒 En crecimiento:\n- Evita dietas extremas\n- Alimentación balanceada\n\n";
}
else if(edad < 40){
reco += "💪 Buen momento para mejorar condición física\n\n";
}
else{
reco += "🧓 Cuida metabolismo y corazón\n\n";
}

// Objetivo
if(objetivo.includes("Bajar")){
reco += "🔥 Bajar peso:\n- Déficit calórico\n- Cardio + fuerza\n\n";
}
else if(objetivo.includes("Mantener")){
reco += "⚖️ Mantener:\n- Equilibrio calorías\n\n";
}
else{
reco += "💪 Subir peso:\n- Superávit calórico\n- Entrenamiento fuerza\n\n";
}

// IMC
if(clasificacion==="Bajo peso"){
reco += "🍽️ Aumenta calorías saludables";
}
else if(clasificacion==="Normal"){
reco += "✅ Sigue igual";
}
else if(clasificacion==="Sobrepeso"){
reco += "⚠️ Reduce azúcares y haz ejercicio diario";
}
else{
reco += "🚨 Mejora hábitos y consulta especialista";
}

return reco;
}

function calcularIMC(){

let nombre=document.getElementById("nombre").value;
let edad=parseInt(document.getElementById("edad").value);
let peso=parseFloat(document.getElementById("peso").value);
let altura=parseFloat(document.getElementById("altura").value);
let objetivo=document.getElementById("objetivo").value;

if(!peso || !altura || !edad || !nombre){
alert("Completa todos los campos");
return;
}

let imc=peso/(altura*altura);

let clasificacion="";
let color="";
let progreso=0;

if(imc<18.5){
clasificacion="Bajo peso";
color="orange";
progreso=25;
}
else if(imc<25){
clasificacion="Normal";
color="green";
progreso=50;
}
else if(imc<30){
clasificacion="Sobrepeso";
color="gold";
progreso=75;
}
else{
clasificacion="Obesidad";
color="red";
progreso=100;
}

let recomendacion = generarRecomendaciones(edad, objetivo, clasificacion);

let barra=document.getElementById("progreso");
barra.style.width=progreso+"%";
barra.style.background=color;
barra.innerHTML=clasificacion;

document.getElementById("resultado").innerHTML=
`👤 <b>${nombre}</b><br>
📊 IMC: <b>${imc.toFixed(2)}</b><br>
📌 Estado: <b>${clasificacion}</b><br><br>
🧠 <b>Recomendaciones:</b><br>
${recomendacion.replace(/\n/g,"<br>")}`;

guardarHistorial(nombre,new Date().toLocaleDateString(),imc.toFixed(2),clasificacion);
}

function guardarHistorial(nombre,fecha,imc,clasificacion){
let datos=JSON.parse(localStorage.getItem("historial")) || [];
datos.push({nombre,fecha,imc,clasificacion});
localStorage.setItem("historial",JSON.stringify(datos));
cargarHistorial();
}

function cargarHistorial(){
let datos=JSON.parse(localStorage.getItem("historial")) || [];
let tabla=document.getElementById("historial");
tabla.innerHTML="";
datos.forEach(d=>{
tabla.innerHTML+=`<tr>
<td>${d.nombre}</td>
<td>${d.fecha}</td>
<td>${d.imc}</td>
<td>${d.clasificacion}</td>
</tr>`;
});
}

function borrarHistorial(){
if(confirm("¿Borrar historial?")){
localStorage.removeItem("historial");
cargarHistorial();
}
}

function modoOscuro(){
document.body.classList.toggle("dark");
}

async function generarPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let nombre=document.getElementById("nombre").value;
let imc=(document.getElementById("peso").value)/(document.getElementById("altura").value**2);

doc.text(`Reporte IMC\n\nNombre: ${nombre}\nIMC: ${imc.toFixed(2)}`,20,20);
doc.save("IMC.pdf");
}

</script>

</body>
</html>
